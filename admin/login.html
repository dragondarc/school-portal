<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>เข้าสู่ระบบผู้ดูแล | Teacher Portal</title>
<link rel="stylesheet" href="../css/style.css"/>
<link rel="stylesheet" href="../css/admin.css"/>
</head>
<body>
<div class="bg-effects">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">🔐</div>
    <h1 class="login-title">ผู้ดูแลระบบ</h1>
    <p class="login-desc">เข้าสู่ระบบเพื่อจัดการข้อมูลนักเรียน</p>

    <form id="login-form" class="login-form">
      <div class="form-group">
        <label class="form-label" for="username">ชื่อผู้ใช้</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="username" class="form-input" placeholder="กรอกชื่อผู้ใช้" autocomplete="username"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">รหัสผ่าน</label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input type="password" id="password" class="form-input" placeholder="กรอกรหัสผ่าน" autocomplete="current-password"/>
          <button type="button" id="toggle-pw" class="input-toggle">👁</button>
        </div>
      </div>
      <div id="login-error" class="login-error" style="display:none">❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
      <button type="submit" id="login-btn" class="btn-primary">เข้าสู่ระบบ</button>
    </form>

    <a href="../index.html" class="login-back">← กลับหน้าหลัก</a>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/supabase-config.js"></script>

<script>
const ADMIN_USER = 'Sorawit255';
const ADMIN_PASS = '023154654a';

// เตรียม Supabase client สำหรับ login page
let _sbLogin = null;
if (typeof SUPABASE_ENABLED !== 'undefined' && SUPABASE_ENABLED) {
  try {
    _sbLogin = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch(e) { console.warn('[Supabase] init ล้มเหลว:', e.message); }
}

document.getElementById('toggle-pw').addEventListener('click', function(){
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
  this.textContent = pw.type === 'password' ? '👁' : '🙈';
});

document.getElementById('login-form').addEventListener('submit', async function(e){
  e.preventDefault();
  const u   = document.getElementById('username').value.trim();
  const p   = document.getElementById('password').value;
  const err = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');

  btn.textContent = 'กำลังตรวจสอบ...';
  btn.disabled    = true;

  if (u === ADMIN_USER && p === ADMIN_PASS) {
    // Sign in ใน Supabase Auth ด้วย (ถ้าเปิดใช้งาน)
    if (_sbLogin) {
      try {
        const { error } = await _sbLogin.auth.signInWithPassword({
          email:    SUPABASE_ADMIN_EMAIL,
          password: p
        });
        if (error) console.warn('[Supabase] Auth ไม่สำเร็จ (ทำงาน offline):', error.message);
        else        console.log('[Supabase] ✅ Admin signed in');
      } catch(e) { console.warn('[Supabase]', e.message); }
    }
    sessionStorage.setItem('admin_logged_in', 'true');
    window.location.href = 'dashboard.html';
  } else {
    err.style.display = 'block';
    btn.textContent   = 'เข้าสู่ระบบ';
    btn.disabled      = false;
    document.getElementById('password').value = '';
  }
});
</script>
</body>
</html>
